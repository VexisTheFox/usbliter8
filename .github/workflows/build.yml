name: Build Pico 2 W UF2

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi python3 git

      - name: Clone Pico SDK
        run: |
          git clone --recursive https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DPICO_BOARD=pico2_w \
            -DPICO_SDK_PATH=$HOME/pico-sdk

      - name: Build
        run: |
          cmake --build build

      - name: Rename UF2
        run: |
          mkdir -p release
          cp build/*.uf2 release/usbliter8-pico2w.uf2

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: usbliter8-pico2w-uf2
          path: release/usbliter8-pico2w.uf2

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/usbliter8-pico2w.uf2 \
            --title "${GITHUB_REF_NAME}" \
            --notes "Auto-built Pico 2 W UF2"
