name: Build Pico 2 W UF2

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi python3 git

      - name: Clone Pico SDK
        run: |
          git clone --recursive https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DPICO_BOARD=pico2_w \
            -DPICO_SDK_PATH=$HOME/pico-sdk

      - name: Build
        run: |
          cmake --build build

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: usbliter8-pico2w-uf2
          path: build/*.uf2
